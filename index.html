<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://i.ibb.co/sprJ32RT/image.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
        
        /* สร้างพื้นหลังโทนสีม่วงแบบในรูป (สามารถเปลี่ยนเป็น background-image รูปวิวป่าได้ถ้ามี) */
        .bg-custom-gradient {
            background: linear-gradient(135deg, #131446 0%, #241480 50%, #3e3b97 100%);
        }

        /* เอฟเฟกต์กล่องกระจกใส */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* แก้ปัญหาสีพื้นหลังตอนเบราว์เซอร์จำรหัสผ่าน (Autofill) */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #c19ee2 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="min-h-screen bg-custom-gradient text-white flex items-center justify-center px-4 relative overflow-hidden">

    <div class="glass-panel rounded-[2rem] w-full max-w-[400px] p-8 md:p-10 flex flex-col items-center relative z-10 transition-transform duration-500 hover:scale-[1.01]">
        
        <img src="https://i.ibb.co/sprJ32RT/image.png" alt="System Logo" class="w-24 h-auto mb-2 drop-shadow-xl">
        
        <h2 class="text-3xl font-bold text-white mb-8 tracking-wide">SYSTEM LOGIN</h2>

        <form id="login-form" class="w-full space-y-5">
            
            <div class="relative">
                <input type="text" id="login-username" required placeholder="Username" 
                    class="w-full px-5 py-3.5 bg-transparent border border-white/40 rounded-full focus:ring-2 focus:ring-white/60 focus:border-transparent outline-none text-white text-sm transition-all placeholder-white/70">
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-white/80" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" /></svg>
                </div>
            </div>

            <div class="relative">
                <input type="password" id="login-password" required placeholder="Password" 
                    class="w-full px-5 py-3.5 bg-transparent border border-white/40 rounded-full focus:ring-2 focus:ring-white/60 focus:border-transparent outline-none text-white text-sm transition-all placeholder-white/70">
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-white/80" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" /></svg>
                </div>
            </div>
            
            <div class="flex items-center justify-between text-[13px] text-white/90 px-2 pt-1 pb-2">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" class="mr-2 rounded bg-transparent border-white/40 text-purple-600 focus:ring-purple-500">
                    จดจำรหัสผ่าน
                </label>
                <a href="https://t.me/x_Haoyun66" target="_blank" class="hover:text-white hover:underline transition-colors">ลืมรหัสผ่าน</a>
            </div>

            <div id="login-status" class="hidden text-sm font-medium text-center p-3 rounded-xl border backdrop-blur-md"></div>

            <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-full bg-white hover:bg-gray-100 text-[#581c87] text-[15px] font-bold transition-all shadow-lg active:scale-[0.98]">
                Login
            </button>
            
            <div class="text-center text-[13px] text-white/90 mt-6">
                ยังไม่มีบัญชีใช่ไหม? <a href="https://t.me/x_Haoyun66" target="_blank" class="text-white font-bold hover:underline ml-1">ติดต่อลงทะเบียน</a>
            </div>
        </form>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzuV8aqMNFhtf9TI-bt9DC59bD9J2-CEfWj4ebHnFpu53gCOBCpcYm1QmyT6d1F70Lx/exec';
        const DESTINATION_URL = 'https://hy-c9.github.io/Smart-Ai/';

        window.onload = () => {
            const currentUser = JSON.parse(localStorage.getItem('active_user'));
            if (currentUser && new Date().getTime() <= currentUser.expireAt) {
                window.location.replace(DESTINATION_URL);
            }
        };

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            const statusBox = document.getElementById('login-status');
            const submitBtn = document.getElementById('submit-btn');

            // เปลี่ยนสถานะปุ่มเป็นกำลังโหลด
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<svg class="animate-spin h-5 w-5 mx-auto text-[#581c87]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            statusBox.classList.add('hidden');

            try {
                const response = await fetch(WEB_APP_URL);
                const dbUsers = await response.json();
                
                const foundUser = dbUsers.find(u => u.username === user && u.password === pass);

                if (foundUser) {
                    if (new Date().getTime() > foundUser.expireAt) {
                        showStatus('❌ สิทธิ์การใช้งานหมดอายุ! กรุณาติดต่อผู้ดูแลระบบ', 'error');
                        resetButton();
                    } else {
                        localStorage.setItem('active_user', JSON.stringify(foundUser));
                        window.location.replace(DESTINATION_URL);
                    }
                } else {
                    showStatus('⚠️ Username หรือ Password ไม่ถูกต้อง', 'error');
                    resetButton();
                }

            } catch (error) {
                console.error("การเชื่อมต่อล้มเหลว:", error);
                showStatus('⚠️ ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่ หรือเช็คเน็ต', 'error');
                resetButton();
            }
        });

        function showStatus(message, type) {
            const statusBox = document.getElementById('login-status');
            statusBox.textContent = message;
            statusBox.classList.remove('hidden', 'bg-red-500/50', 'text-white', 'border-red-400/50');
            
            if (type === 'error') {
                statusBox.classList.add('bg-red-500/50', 'text-white', 'border-red-400/50');
            }
        }

        function resetButton() {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Login';
        }
    </script>
</body>
</html>
