<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HY System Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .pop-up { animation: popUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popUp {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .bg-login-screen {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="min-h-screen bg-login-screen text-slate-800 flex items-center justify-center px-4 overflow-hidden relative">

    <div class="absolute inset-0 overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#0F767D]/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="bg-slate-900/80 backdrop-blur-xl rounded-3xl shadow-2xl w-full max-w-[400px] p-10 flex flex-col items-center pop-up border border-slate-700/50 relative z-10">
        
        <div class="w-20 h-20 bg-gradient-to-br from-[#0F767D] to-slate-800 rounded-2xl flex items-center justify-center mb-6 shadow-lg transform rotate-3 border border-slate-600">
            <svg class="w-10 h-10 text-white transform -rotate-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
        </div>
        
        <h2 class="text-3xl font-bold text-white mb-1 tracking-tight">SYSTEM LOGIN</h2>
        <p class="text-xs text-slate-400 mb-8 text-center uppercase tracking-widest">Enterprise Smart Contract</p>

        <form id="login-form" class="w-full space-y-5">
            <div>
                <label class="block text-[11px] font-semibold text-slate-400 mb-1.5 tracking-wider uppercase">Username / ID</label>
                <input type="text" id="login-username" required placeholder="Enter your ID" class="w-full px-4 py-3.5 bg-slate-800/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0F767D] focus:border-transparent outline-none text-white text-sm transition-all placeholder-slate-600">
            </div>
            <div>
                <label class="block text-[11px] font-semibold text-slate-400 mb-1.5 tracking-wider uppercase">Password</label>
                <input type="password" id="login-password" required placeholder="••••••••" class="w-full px-4 py-3.5 bg-slate-800/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-[#0F767D] focus:border-transparent outline-none text-white text-sm transition-all placeholder-slate-600">
            </div>
            
            <div id="login-status" class="hidden text-xs font-medium text-center p-3 rounded-lg border"></div>

            <button type="submit" id="submit-btn" class="w-full mt-2 py-3.5 rounded-xl bg-gradient-to-r from-[#0F767D] to-[#0a4f54] hover:from-[#0c5e64] hover:to-[#083b3f] text-white text-sm font-bold transition-all shadow-[0_0_20px_rgba(15,118,125,0.3)] hover:shadow-[0_0_25px_rgba(15,118,125,0.5)] active:scale-[0.98]">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <script>
        // ใส่ URL Web App ของคุณที่นี่
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzuV8aqMNFhtf9TI-bt9DC59bD9J2-CEfWj4ebHnFpu53gCOBCpcYm1QmyT6d1F70Lx/exec';
        
        // ลิงก์ปลายทางเมื่อเข้าสู่ระบบสำเร็จ
        const DESTINATION_URL = 'https://hy-c9.github.io/Smart-Ai/';

        // เช็คว่าเคยล็อคอินทิ้งไว้และยังไม่หมดอายุไหม ถ้าใช่ให้เด้งไปเว็บหลักเลยทันที
        window.onload = () => {
            const currentUser = JSON.parse(localStorage.getItem('active_user'));
            if (currentUser && new Date().getTime() <= currentUser.expireAt) {
                window.location.replace(DESTINATION_URL);
            }
        };

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value.trim();
            const statusBox = document.getElementById('login-status');
            const submitBtn = document.getElementById('submit-btn');

            // เปลี่ยนสถานะปุ่มเป็นกำลังโหลด
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<svg class="animate-spin h-5 w-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            statusBox.classList.add('hidden');

            try {
                // ดึงข้อมูลจากฐานข้อมูล Google Sheets
                const response = await fetch(WEB_APP_URL);
                const dbUsers = await response.json();
                
                // ค้นหาผู้ใช้ที่ตรงกับที่กรอก
                const foundUser = dbUsers.find(u => u.username === user && u.password === pass);

                if (foundUser) {
                    if (new Date().getTime() > foundUser.expireAt) {
                        showStatus('❌ สิทธิ์การใช้งานหมดอายุ! กรุณาติดต่อผู้ดูแลระบบ', 'error');
                        resetButton();
                    } else {
                        // บันทึกข้อมูลลง LocalStorage เพื่อให้ระบบจำ
                        localStorage.setItem('active_user', JSON.stringify(foundUser));
                        
                        // เด้งไปหน้าหลักทันทีแบบไม่มีดีเลย์ (ไม่ต้องโชว์ข้อความสำเร็จแล้ว)
                        window.location.replace(DESTINATION_URL);
                    }
                } else {
                    showStatus('⚠️ Username หรือ Password ไม่ถูกต้อง', 'error');
                    resetButton();
                }

            } catch (error) {
                console.error("การเชื่อมต่อล้มเหลว:", error);
                showStatus('⚠️ ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาลองใหม่', 'error');
                resetButton();
            }
        });

        function showStatus(message, type) {
            const statusBox = document.getElementById('login-status');
            statusBox.textContent = message;
            statusBox.classList.remove('hidden', 'bg-red-500/10', 'text-red-400', 'border-red-500/20');
            
            if (type === 'error') {
                statusBox.classList.add('bg-red-500/10', 'text-red-400', 'border-red-500/20');
            }
        }

        function resetButton() {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'เข้าสู่ระบบ';
        }
    </script>
</body>
</html>
